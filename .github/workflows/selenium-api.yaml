name: Run Selenium Script from API Request

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API URL to send the download back to'
        required: true
        type: string
      selenium_script:
        description: 'Selenium script to execute'
        required: true
        type: string

jobs:
  run-selenium-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository (if needed)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3: Install Chrome browser (ensure it's available)
      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Step 4: Install required dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium undetected-chromedriver requests

      # Step 5: Write the Selenium script to a file
      - name: Write Selenium Script to File
        run: |
          echo "${{ github.event.inputs.selenium_script }}" > selenium_script.py

      # Step 6: Run the generated Selenium script
      - name: Run Selenium Script
        run: |
          python selenium_script.py

      # Step 7: Find and move the downloaded file
      - name: Find downloaded file
        run: |
          # Create downloads directory
          mkdir -p $GITHUB_WORKSPACE/downloads
          
          # Try to find the Excel file in common download locations
          # You may need to adjust the filename pattern based on what Xero exports
          find /home/runner/ -name "*.xlsx" -type f | head -1 | xargs -I {} cp {} $GITHUB_WORKSPACE/downloads/file.xlsx 2>/dev/null || true
          find /tmp/ -name "*.xlsx" -type f | head -1 | xargs -I {} cp {} $GITHUB_WORKSPACE/downloads/file.xlsx 2>/dev/null || true
          
          # Check if file was found
          if [ -f "$GITHUB_WORKSPACE/downloads/file.xlsx" ]; then
            echo "File downloaded successfully"
          else
            echo "No Excel file found. Creating empty file for debugging."
            touch $GITHUB_WORKSPACE/downloads/file.xlsx
          fi

      # Step 8: Upload the downloaded file as an artifact for debugging
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-download
          path: $GITHUB_WORKSPACE/downloads/file.xlsx

      # Step 9: Send response to API
      - name: Send response to API
        run: |
          if [ -s "$GITHUB_WORKSPACE/downloads/file.xlsx" ]; then
            curl -X POST \
              -F "file=@$GITHUB_WORKSPACE/downloads/file.xlsx" \
              -F "api_key=YOUR_API_KEY" \
              ${{ github.event.inputs.api_url }}
          else
            echo "No file to send or file is empty"
          fi
