name: Run Selenium Script from API Request

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API URL to send the download back to'
        required: true
        type: string
      selenium_script:
        description: 'Selenium script to execute'
        required: true
        type: string

jobs:
  run-selenium-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3: Install Chrome browser
      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Step 4: Install required dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium undetected-chromedriver requests webdriver-manager

      # Step 5: Set up environment variables
      - name: Set environment variables
        run: |
          echo "API_URL=${{ github.event.inputs.api_url }}" >> $GITHUB_ENV
          echo "GITHUB_WORKSPACE=${{ github.workspace }}" >> $GITHUB_ENV

      # Step 6: Write the Selenium script to a file
      - name: Write Selenium Script to File
        run: |
          echo "${{ github.event.inputs.selenium_script }}" > selenium_script.py

      # Step 7: Run the generated Selenium script with error handling
      - name: Run Selenium Script
        id: run_selenium
        continue-on-error: true
        run: |
          # Create debug directory first
          mkdir -p $GITHUB_WORKSPACE/debug
          python selenium_script.py || echo "SCRIPT_FAILED=true" >> $GITHUB_ENV

      # Step 8: Find and move the downloaded file (if successful)
      - name: Find downloaded file
        if: env.SCRIPT_FAILED != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/downloads
          
          # Try to find the Excel file in common download locations
          find /home/runner/ -name "*.xlsx" -type f | head -1 | xargs -I {} cp {} $GITHUB_WORKSPACE/downloads/file.xlsx 2>/dev/null || true
          find /tmp/ -name "*.xlsx" -type f | head -1 | xargs -I {} cp {} $GITHUB_WORKSPACE/downloads/file.xlsx 2>/dev/null || true
          
          # Check if file was found
          if [ -f "$GITHUB_WORKSPACE/downloads/file.xlsx" ]; then
            echo "File downloaded successfully"
          else
            echo "No Excel file found. Creating empty file for debugging."
            touch $GITHUB_WORKSPACE/downloads/file.xlsx
          fi

      # Step 9: Check for debug files and prepare them for upload
      - name: Prepare debug files for upload
        run: |
          echo "Checking for debug files..."
          
          # Create debug directory if it doesn't exist
          mkdir -p $GITHUB_WORKSPACE/debug
          
          # List files in debug directory
          echo "Files in debug directory:"
          ls -la $GITHUB_WORKSPACE/debug/ || echo "Debug directory empty or doesn't exist"
          
          # Count files in debug directory
          file_count=$(find $GITHUB_WORKSPACE/debug/ -type f 2>/dev/null | wc -l || echo "0")
          echo "Number of debug files found: $file_count"
          
          if [ "$file_count" -eq "0" ]; then
            echo "No debug files found. Creating a placeholder file with error info."
            echo "No debug files were generated during script execution." > $GITHUB_WORKSPACE/debug/no_debug_files.txt
            echo "Script status: ${{ job.status }}" >> $GITHUB_WORKSPACE/debug/no_debug_files.txt
            echo "SCRIPT_FAILED: $SCRIPT_FAILED" >> $GITHUB_WORKSPACE/debug/no_debug_files.txt
            echo "Timestamp: $(date)" >> $GITHUB_WORKSPACE/debug/no_debug_files.txt
          fi

      # Step 10: Upload debug files as artifact (always)
      - name: Upload debug files
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: $GITHUB_WORKSPACE/debug/
          if-no-files-found: warn

      # Step 11: Upload downloaded file as artifact (if successful)
      - name: Upload downloaded file
        if: env.SCRIPT_FAILED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: selenium-download
          path: $GITHUB_WORKSPACE/downloads/file.xlsx
          if-no-files-found: warn

      # Step 12: Send file to API if successful
      - name: Send file to API
        if: env.SCRIPT_FAILED != 'true'
        run: |
          if [ -s "$GITHUB_WORKSPACE/downloads/file.xlsx" ]; then
            echo "Sending downloaded file to API..."
            curl -X POST \
              -F "file=@$GITHUB_WORKSPACE/downloads/file.xlsx" \
              -F "success=true" \
              -F "message=File downloaded successfully" \
              ${{ github.event.inputs.api_url }}
          else
            echo "No file to send or file is empty"
            curl -X POST \
              -F "success=false" \
              -F "message=No file was downloaded" \
              ${{ github.event.inputs.api_url }}
          fi

      # Step 13: Handle failure - Upload debug files to API
      - name: Send debug files to API on failure
        if: failure() || env.SCRIPT_FAILED == 'true'
        run: |
          echo "Script failed. Checking for debug files to upload to API..."
          
          # Check if debug directory exists and has files
          if [ -d "$GITHUB_WORKSPACE/debug" ]; then
            echo "Found debug directory"
            
            # Get all debug files
            debug_files=$(find $GITHUB_WORKSPACE/debug/ -type f -name "*.png" -o -name "*.html" -o -name "*.txt" 2>/dev/null)
            
            if [ -n "$debug_files" ]; then
              echo "Debug files found:"
              echo "$debug_files"
              
              # Get the latest screenshot
              latest_png=$(ls -t $GITHUB_WORKSPACE/debug/*.png 2>/dev/null | head -1)
              latest_html=$(ls -t $GITHUB_WORKSPACE/debug/*.html 2>/dev/null | head -1)
              
              if [ -n "$latest_png" ] && [ -f "$latest_png" ]; then
                echo "Uploading $latest_png to API..."
                curl -X POST \
                  -F "screenshot=@$latest_png" \
                  -F "status=failed" \
                  -F "error_message=Script failed - see screenshot" \
                  ${{ github.event.inputs.api_url }}
              elif [ -n "$latest_html" ] && [ -f "$latest_html" ]; then
                echo "Uploading $latest_html to API..."
                curl -X POST \
                  -F "html=@$latest_html" \
                  -F "status=failed" \
                  -F "error_message=Script failed - see HTML" \
                  ${{ github.event.inputs.api_url }}
              else
                echo "No suitable debug files found for upload"
              fi
            else
              echo "No debug files found in debug directory"
            fi
          else
            echo "Debug directory doesn't exist"
          fi
