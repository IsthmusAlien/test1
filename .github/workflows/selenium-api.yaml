name: Run Selenium Script from API Request

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API URL to send the download back to'
        required: true
        type: string
      selenium_script:
        description: 'Selenium script to execute'
        required: true
        type: string

jobs:
  run-selenium-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository (if needed)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3: Install required dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium undetected-chromedriver requests

      # Step 4: Run the user's Selenium script directly
      - name: Run Selenium Script
        run: |
          python -c "${{ github.event.inputs.selenium_script }}"

      # Step 5: Move the downloaded file to the GitHub workspace (adjust path as needed)
      - name: Find and move the downloaded file
        run: |
          mkdir -p $GITHUB_WORKSPACE/downloads  # Ensure the downloads directory exists
          mv /root/Downloads/downloaded_file.xlsx $GITHUB_WORKSPACE/downloads/file.xlsx || echo "File not found"  # Adjust path as necessary

      # Step 6: Upload the downloaded file as an artifact for debugging or further inspection
      - name: Upload the downloaded file as artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: selenium-download
          path: $GITHUB_WORKSPACE/downloads/file.xlsx

      # Step 7: Send response to API
      - name: Send response to API
        run: |
          curl -X POST \
            -F "file=@$GITHUB_WORKSPACE/downloads/file.xlsx" \  # Path to the downloaded file
            -F "api_key=YOUR_API_KEY" \  # Replace with your actual API key or authentication method
            ${{ github.event.inputs.api_url }}  # Send the file to the API URL
