name: Run Selenium Script from API Request

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API URL to send the download back to'
        required: true
        type: string
      selenium_script:
        description: 'Selenium script to execute'
        required: true
        type: string

jobs:
  run-selenium-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Added this to allow committing to repo

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3: Install Chrome browser
      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Step 4: Install required dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium undetected-chromedriver requests webdriver-manager

      # Step 5: Set up environment variables
      - name: Set environment variables
        run: |
          echo "API_URL=${{ github.event.inputs.api_url }}" >> $GITHUB_ENV
          echo "GITHUB_WORKSPACE=${{ github.workspace }}" >> $GITHUB_ENV

      # Step 6: Write the Selenium script to a file
      - name: Write Selenium Script to File
        run: |
          echo "${{ github.event.inputs.selenium_script }}" > selenium_script.py

      # Step 7: Run the generated Selenium script with error handling
      - name: Run Selenium Script
        id: run_selenium
        continue-on-error: true
        run: |
          # Create directories first
          mkdir -p $GITHUB_WORKSPACE/screenshots
          mkdir -p $GITHUB_WORKSPACE/page_sources
          python selenium_script.py || echo "SCRIPT_FAILED=true" >> $GITHUB_ENV

      # Step 8: Find and move the downloaded file (if successful)
      - name: Find downloaded file
        if: env.SCRIPT_FAILED != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/downloads
          
          # Try to find the Excel file in common download locations
          find /home/runner/ -name "*.xlsx" -type f | head -1 | xargs -I {} cp {} $GITHUB_WORKSPACE/downloads/file.xlsx 2>/dev/null || true
          find /tmp/ -name "*.xlsx" -type f | head -1 | xargs -I {} cp {} $GITHUB_WORKSPACE/downloads/file.xlsx 2>/dev/null || true
          
          # Check if file was found
          if [ -f "$GITHUB_WORKSPACE/downloads/file.xlsx" ]; then
            echo "File downloaded successfully"
          else
            echo "No Excel file found. Creating empty file for debugging."
            touch $GITHUB_WORKSPACE/downloads/file.xlsx
          fi

      # Step 9: Upload files as artifacts
      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: |
            ${{ github.workspace }}/screenshots/
            ${{ github.workspace }}/page_sources/
          if-no-files-found: ignore

      - name: Upload downloaded file as artifact
        if: env.SCRIPT_FAILED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: selenium-download
          path: ${{ github.workspace }}/downloads/file.xlsx
          if-no-files-found: ignore

      # Step 10: Commit files to repository
      - name: Commit files to repository
        run: |
          echo "Checking for files to commit..."
          
          # Create directories if they don't exist
          mkdir -p screenshots
          mkdir -p page_sources
          
          # Move any generated files to timestamped names
          if find ${{ github.workspace }}/screenshots/ -name "*.png" -maxdepth 1 | read; then
            for file in ${{ github.workspace }}/screenshots/*.png; do
              if [ -f "$file" ]; then
                timestamp=$(date +%Y%m%d_%H%M%S)
                filename=$(basename "$file")
                new_name="${filename%.*}_${timestamp}.png"
                cp "$file" "screenshots/$new_name"
                echo "Copied: $file -> screenshots/$new_name"
              fi
            done
          fi
          
          if find ${{ github.workspace }}/page_sources/ -name "*.html" -maxdepth 1 | read; then
            for file in ${{ github.workspace }}/page_sources/*.html; do
              if [ -f "$file" ]; then
                timestamp=$(date +%Y%m%d_%H%M%S)
                filename=$(basename "$file")
                new_name="${filename%.*}_${timestamp}.html"
                cp "$file" "page_sources/$new_name"
                echo "Copied: $file -> page_sources/$new_name"
              fi
            done
          fi
          
          # Only commit if we have files
          if [ -n "$(ls -A screenshots/ 2>/dev/null)" ] || [ -n "$(ls -A page_sources/ 2>/dev/null)" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            
            if [ -n "$(ls -A screenshots/ 2>/dev/null)" ]; then
              git add screenshots/
            fi
            
            if [ -n "$(ls -A page_sources/ 2>/dev/null)" ]; then
              git add page_sources/
            fi
            
            # Check if there are changes to commit
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Add Selenium results from workflow run $(date +%Y%m%d_%H%M%S)"
              git push
            fi
          else
            echo "No screenshots or page sources to commit"
          fi

      # Step 11: Send file to API if successful
      - name: Send file to API
        if: env.SCRIPT_FAILED != 'true'
        run: |
          if [ -s "${{ github.workspace }}/downloads/file.xlsx" ]; then
            echo "Sending downloaded file to API..."
            curl -X POST \
              -F "file=@${{ github.workspace }}/downloads/file.xlsx" \
              -F "success=true" \
              -F "message=File downloaded successfully" \
              ${{ github.event.inputs.api_url }}
          else
            echo "No file to send or file is empty"
            curl -X POST \
              -F "success=false" \
              -F "message=No file was downloaded" \
              ${{ github.event.inputs.api_url }}
          fi

      # Step 12: Handle failure - Send debug info to API
      - name: Send debug info to API on failure
        if: failure() || env.SCRIPT_FAILED == 'true'
        run: |
          echo "Script failed. Sending failure notification to API..."
          
          # Check for any screenshot files
          latest_png=$(find ${{ github.workspace }}/screenshots/ -name "*.png" -type f 2>/dev/null | sort -r | head -1)
          latest_html=$(find ${{ github.workspace }}/page_sources/ -name "*.html" -type f 2>/dev/null | sort -r | head -1)
          
          if [ -n "$latest_png" ] && [ -f "$latest_png" ]; then
            echo "Uploading $latest_png to API..."
            curl -X POST \
              -F "screenshot=@$latest_png" \
              -F "status=failed" \
              -F "error_message=Script failed - see screenshot" \
              ${{ github.event.inputs.api_url }}
          elif [ -n "$latest_html" ] && [ -f "$latest_html" ]; then
            echo "Uploading $latest_html to API..."
            curl -X POST \
              -F "html=@$latest_html" \
              -F "status=failed" \
              -F "error_message=Script failed - see HTML" \
              ${{ github.event.inputs.api_url }}
          else
            echo "No debug files found, sending basic failure notification"
            curl -X POST \
              -F "status=failed" \
              -F "error_message=Script failed without generating debug files" \
              ${{ github.event.inputs.api_url }}
          fi
